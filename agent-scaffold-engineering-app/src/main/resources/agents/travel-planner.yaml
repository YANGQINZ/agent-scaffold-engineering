agents:
  # Workflow模式示例：旅行规划师（线性节点编排）
  - id: "travel-planner"
    name: "旅行规划师"
    mode: WORKFLOW
    instruction: "你是一个旅行规划助手，帮助用户规划完整的旅行行程。"
    model:
      name: "qwq-plus"
      temperature: 0.5
      maxTokens: 2000
    workflow:
      entry: "collect_info"
      nodes:
        - id: "collect_info"
          agentId: "info-collector"
          next: "search_routes"
        - id: "search_routes"
          agentId: "route-searcher"
          next: "generate_plan"
        - id: "generate_plan"
          agentId: "plan-generator"

  # 子Agent: 信息收集
  - id: "info-collector"
    name: "信息收集员"
    mode: REACT
    instruction: "你是旅行信息收集员，负责从用户那里收集出行需求信息（目的地、出发地、时间、预算等）。请用中文与用户交流。"
    model:
      name: "qwq-plus"
      temperature: 0.7

  # 子Agent: 路线搜索
  - id: "route-searcher"
    name: "路线搜索员"
    mode: REACT
    instruction: "你是路线搜索员，根据收集到的旅行需求搜索合适的交通路线。"
    tools:
      - name: "searchRoute"
        type: FUNCTION
        description: "搜索两个城市之间的交通路线"
        className: "com.ai.agent.domain.agent.tools.RouteSearchTool"
    model:
      name: "qwq-plus"
      temperature: 0.5

  # 子Agent: 行程生成
  - id: "plan-generator"
    name: "行程生成员"
    mode: REACT
    instruction: "你是行程生成员，根据收集的信息和搜索到的路线，生成完整的旅行行程计划。请用中文输出。"
    model:
      name: "qwq-plus"
      temperature: 0.6
