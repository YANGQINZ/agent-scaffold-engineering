agent:
  id: "research-hybrid"
  name: "研究助手"
  engine: HYBRID
  instruction: "你是一个深度研究分析助手，能够进行深度搜索和总结。"
  model:
    name: "qwq-plus"
    temperature: 0.5
  graph:
    start: "research"
    nodes:
      - id: "research"
        reactAgentId: "deep-researcher"
      - id: "summarize"
        agentId: "summarizer"
    edges:
      - from: "research"
        to: "summarize"
  subEngines:
    research: AGENTSCOPE
    summarize: GRAPH
