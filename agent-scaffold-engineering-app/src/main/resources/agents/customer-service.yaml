agents:
  # Graph模式示例：智能客服系统（条件分支路由）
  - id: "customer-service"
    name: "客服系统"
    mode: GRAPH
    instruction: "你是智能客服系统，根据用户问题类型路由到对应的处理节点。"
    model:
      name: "qwq-plus"
      temperature: 0.3
    graph:
      start: "classify"
      nodes:
        - id: "classify"
          agentId: "classifier"
        - id: "faq"
          agentId: "faq-bot"
        - id: "human"
          agentId: "human-agent"
      edges:
        - from: "classify"
          to: "faq"
          condition: "type==faq"
        - from: "classify"
          to: "human"
          condition: "type==complex"

  # 子Agent: 意图分类
  - id: "classifier"
    name: "意图分类器"
    mode: REACT
    instruction: "你是意图分类器，分析用户问题类型。如果是常见FAQ问题，输出'type==faq'；如果是复杂问题或需要人工，输出'type==complex'。只输出分类结果，不要解释。"
    model:
      name: "qwq-plus"
      temperature: 0.1

  # 子Agent: FAQ回复
  - id: "faq-bot"
    name: "FAQ机器人"
    mode: REACT
    instruction: "你是FAQ机器人，回答常见的客户问题。"
    tools:
      - name: "searchFaq"
        type: FUNCTION
        description: "搜索FAQ知识库"
        className: "com.ai.agent.domain.agent.tools.FaqTool"
    model:
      name: "qwq-plus"
      temperature: 0.3

  # 子Agent: 人工代理
  - id: "human-agent"
    name: "人工代理"
    mode: REACT
    instruction: "你是人工代理，处理需要人工介入的复杂客户问题。请先安抚用户情绪，然后提供解决方案或转接路径。"
    model:
      name: "qwq-plus"
      temperature: 0.5
