agent:
  id: "research-team"
  name: "研究团队"
  engine: AGENTSCOPE
  instruction: "你是一个深度研究团队，能够进行多角度搜索和总结。"
  model:
    name: "qwq-plus"
    temperature: 0.5
  agentscope:
    pipeline: "sequential"
    agents:
      - agentId: "deep-researcher"
        enableTools: ["getWeather"]
      - agentId: "summarizer"
