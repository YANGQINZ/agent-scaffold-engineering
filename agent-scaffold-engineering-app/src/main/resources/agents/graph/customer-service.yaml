agent:
  id: "customer-service"
  name: "客服系统"
  engine: GRAPH
  instruction: "你是智能客服系统，根据用户问题类型路由到对应的处理节点。"
  model:
    name: "qwq-plus"
    temperature: 0.3
  graph:
    start: "classify"
    nodes:
      - id: "classify"
        agentId: "classifier"
      - id: "faq"
        agentId: "faq-bot"
      - id: "human"
        agentId: "human-agent"
    edges:
      - from: "classify"
        to: "faq"
        condition: "type==faq"
      - from: "classify"
        to: "human"
        condition: "type==complex"
