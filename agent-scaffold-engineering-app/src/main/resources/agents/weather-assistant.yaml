agents:
  - id: "weather-assistant"
    name: "天气助手"
    mode: REACT
    engine: graph
    instruction: "你是一个天气查询助手，可以帮助用户查询城市天气信息。请用中文回答。"
    model:
      name: "qwq-plus"
      temperature: 0.7
      maxTokens: 2000
    tools:
      - name: "getWeather"
        type: FUNCTION
        description: "查询指定城市的天气信息"
        className: "com.ai.agent.tools.WeatherTool"
